<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <div class="admin-shell">

    <header class="header">
      <div class="header-brand">
        <span class="diamond">◆</span>
        <div>
          <div class="header-title">Email Logs</div>
          <div class="header-subtitle">Sent via chat decisions</div>
        </div>
      </div>
      <a href="/" class="btn-ghost">← Back to chat</a>
    </header>

    <main class="admin-main">
      <div class="admin-stats" id="stats"></div>
      <div class="admin-table-wrap">
        <table class="admin-table" id="table">
          <thead>
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Email</th>
              <th>Sent at</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="admin-empty" id="empty" style="display:none">No emails sent yet.</div>
      </div>
    </main>

  </div>
  <script src="/static/emails.js"></script>
</body>
</html>
